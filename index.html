<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Optimisation stricte pour iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- === Balises pour l'ajout à l'écran d'accueil iOS (PWA) === -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Carnet Pro">
    <link rel="apple-touch-icon" href="logo.png">
    
    <title>Mon Carnet de Notes - Apple Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- === DEBUT FIREBASE === -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <!-- === FIN FIREBASE === -->
    <style>
        /* === VARIABLES THEME CLAIR === */
        :root, body.light-theme, body.system-theme {
            --system-blue: #007AFF;
            --system-green: #34C759;
            --system-orange: #FF9500;
            --system-red: #FF3B30;
            --system-purple: #AF52DE;
            --system-gray: #8E8E93;
            --system-gray6: #F2F2F7;

            --bg-cahier: var(--system-gray6);
            --bg-feuillet: #FFFFFF;
            --bg-input: #FFFFFF;
            --border-reliure: #D1D1D6;
            --txt-primaire: #1C1C1E;
            --txt-secondaire: #8E8E93;
            --separator: rgba(0,0,0,0.08);
            --color-grid: rgba(0, 122, 255, 0.04);
            
            --bg-reliure-strip: #F7F7F7;
            --color-reliure-line: #DBDBDB;
            --bg-card-hover: #FAFAFA;
            --bg-sub-subject: #FAFAFA;
            --bg-topbar: rgba(255, 255, 255, 0.85);
            --bg-modal: rgba(255, 255, 255, 0.88);
            --bg-hover: rgba(0, 0, 0, 0.03);
        }

        /* === VARIABLES THEME SOMBRE === */
        body.dark-theme {
            --system-blue: #0A84FF;
            --system-green: #30D158;
            --system-orange: #FF9F0A;
            --system-red: #FF453A;
            --system-purple: #BF5AF2;
            --system-gray: #98989D;
            --system-gray6: #1C1C1E;

            --bg-cahier: #000000;
            --bg-feuillet: #1C1C1E;
            --bg-input: #2C2C2E;
            --border-reliure: #3A3A3C;
            --txt-primaire: #FFFFFF;
            --txt-secondaire: #AEAEB2;
            --separator: rgba(255, 255, 255, 0.12);
            --color-grid: rgba(10, 132, 255, 0.05);
            
            --bg-reliure-strip: #252528;
            --color-reliure-line: #3A3A3C;
            --bg-card-hover: #262629;
            --bg-sub-subject: #262629;
            --bg-topbar: rgba(28, 28, 30, 0.85);
            --bg-modal: rgba(30, 30, 30, 0.85);
            --bg-hover: rgba(255, 255, 255, 0.05);
        }

        /* === VARIABLES THEME AUTO === */
        @media (prefers-color-scheme: dark) {
            body.system-theme {
                --system-blue: #0A84FF;
                --system-green: #30D158;
                --system-orange: #FF9F0A;
                --system-red: #FF453A;
                --system-purple: #BF5AF2;
                --system-gray: #98989D;
                --system-gray6: #1C1C1E;
                --bg-cahier: #000000;
                --bg-feuillet: #1C1C1E;
                --bg-input: #2C2C2E;
                --border-reliure: #3A3A3C;
                --txt-primaire: #FFFFFF;
                --txt-secondaire: #AEAEB2;
                --separator: rgba(255, 255, 255, 0.12);
                --color-grid: rgba(10, 132, 255, 0.05);
                --bg-reliure-strip: #252528;
                --color-reliure-line: #3A3A3C;
                --bg-card-hover: #262629;
                --bg-sub-subject: #262629;
                --bg-topbar: rgba(28, 28, 30, 0.85);
                --bg-modal: rgba(30, 30, 30, 0.85);
                --bg-hover: rgba(255, 255, 255, 0.05);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            display: flex; height: 100vh; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-cahier); 
            color: var(--txt-primaire); 
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Overlay mobile pour le menu */
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4); z-index: 90; opacity: 0;
            transition: opacity 0.3s ease; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
        }

        .sidebar { 
            width: 280px; background-color: var(--bg-feuillet); 
            display: flex; flex-direction: column; border-right: 1px solid var(--separator); z-index: 100; 
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s ease, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden; white-space: nowrap; flex-shrink: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        body.sidebar-hidden .sidebar { 
            width: 0 !important; opacity: 0 !important; pointer-events: none; 
            border-right-color: transparent !important;
        }

        .sidebar-header { padding: 25px 20px 15px; border-bottom: 1px solid var(--separator); }
        .sidebar-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: var(--txt-primaire); }
        .sidebar-menu { flex: 1; padding: 15px 10px; overflow-y: auto; }
        
        .global-item { padding: 10px 12px; cursor: pointer; font-weight: 600; border-radius: 8px; color: var(--system-blue); transition: all 0.2s; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;}
        .global-item:hover { background: rgba(0, 122, 255, 0.05); }
        .global-item.active { background: var(--system-blue); color: white; }

        .year-section { margin-bottom: 4px; }
        .year-header { padding: 6px 12px; font-weight: 600; font-size: 14px; color: var(--txt-secondaire); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: 6px;}
        .year-header:hover { background: var(--system-gray6); color: var(--txt-primaire); }
        .year-header .icon-arrow { font-size: 9px; opacity: 0.5; transition: transform 0.2s; }
        
        .pages-list { list-style: none; padding-left: 0; display: none; margin-top: 1px;}
        .pages-list.open { display: block; }
        .page-item { padding: 7px 12px 7px 28px; cursor: pointer; font-size: 14px; border-radius: 6px; transition: all 0.2s; color: var(--txt-primaire); margin-bottom: 1px;}
        .page-item:hover { background: var(--bg-hover); }
        .page-item.active { background: rgba(0, 122, 255, 0.08); color: var(--system-blue); font-weight: 600; }
        
        .sidebar-btn { background: none; border: none; color: var(--system-blue); padding: 7px 12px 7px 28px; cursor: pointer; font-size: 14px; font-weight: 500; text-align: left; transition: opacity 0.2s; width: 100%;}
        .sidebar-btn:hover { opacity: 0.7; }
        
        .sidebar-footer { padding: 12px; display: flex; gap: 8px; border-top: 1px solid var(--separator); background: var(--bg-feuillet); }
        .btn-history { flex: 1; padding: 8px; background-color: var(--system-gray6); color: var(--system-blue); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background 0.2s; }
        .btn-history:hover { background-color: var(--separator); }
        .btn-history:disabled { color: var(--txt-secondaire); cursor: not-allowed; opacity: 0.5;}

        /* Zone de contenu principale */
        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative;
            background-image: linear-gradient(var(--color-grid) 1px, transparent 1px), linear-gradient(90deg, var(--color-grid) 1px, transparent 1px);
            background-size: 20px 20px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .topbar { 
            padding: calc(15px + env(safe-area-inset-top)) 40px 15px; 
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5;
            background: var(--bg-topbar); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--separator); min-height: 75px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            gap: 20px;
        }

        .topbar-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
        
        .topbar h1 { 
            font-size: 32px; font-weight: 700; letter-spacing: -0.8px; margin: 0; line-height: 1; 
            display: flex; align-items: center; gap: 10px; color: var(--txt-primaire);
            flex: 1; min-width: 0;
        }
        
        .title-text-ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; }

        .sidebar-toggle-btn {
            background: none; border: none; padding: 6px; border-radius: 8px; cursor: pointer; color: var(--system-blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: background-color 0.2s ease, opacity 0.2s ease;
        }
        .sidebar-toggle-btn:hover { background-color: rgba(0, 122, 255, 0.1); }
        
        .topbar-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;}

        .ios-pill-btn {
            display: inline-flex; align-items: center; justify-content: center; padding: 6px 16px; border-radius: 50px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; border: none; user-select: none; gap: 6px;
        }

        /* --- DA Bouton Simulation (Œil / Oeil Barré) --- */
        .sim-toggle-pill { background-color: var(--system-gray6); color: var(--txt-secondaire); }
        .sim-toggle-pill.active { background-color: rgba(175, 82, 222, 0.12); color: var(--system-purple); }
        .sim-toggle-pill:hover { opacity: 0.8; }
        .sim-toggle-pill .icon-sim-on { display: none; }
        .sim-toggle-pill .icon-sim-off { display: inline-block; }
        .sim-toggle-pill.active .icon-sim-on { display: inline-block; }
        .sim-toggle-pill.active .icon-sim-off { display: none; }

        /* --- DA Bouton Modifier (Crayon / Check) --- */
        .edit-toggle-pill { background-color: rgba(0, 122, 255, 0.1); color: var(--system-blue); }
        .edit-toggle-pill.active { background-color: var(--system-blue); color: #fff; }
        .edit-toggle-pill .icon-edit-on { display: none; }
        .edit-toggle-pill .icon-edit-off { display: inline-block; }
        .edit-toggle-pill.active .icon-edit-on { display: inline-block; }
        .edit-toggle-pill.active .icon-edit-off { display: none; }

        .icon-theme-light, .icon-theme-dark, .icon-theme-system { display: none; }
        body.light-theme .icon-theme-light { display: inline-block; }
        body.dark-theme .icon-theme-dark { display: inline-block; }
        body.system-theme .icon-theme-system { display: inline-block; }

        .theme-circle-btn { padding: 0 !important; width: 34px; height: 34px; border-radius: 50% !important; flex-shrink: 0; }

        body.is-editing .editable-text {
            background: rgba(0, 122, 255, 0.05); color: var(--txt-primaire); cursor: text; padding: 2px 6px; border-radius: 6px; min-width: 20px;
            display: inline-block; transition: all 0.2s ease; border-bottom: 1px dashed rgba(0, 122, 255, 0.3); 
        }
        body.is-editing .editable-text:focus { outline: none; background: var(--bg-feuillet); border-bottom-color: transparent; box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.15), 0 0 0 1px var(--system-blue); }

        .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.5; transition: opacity 0.2s; padding: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        .icon-btn:hover { opacity: 1; }
        .danger-zone { color: var(--system-red); opacity: 0.8;}

        .dashboard-container { padding: 30px 40px; max-width: 950px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 30px; }
        
        .chart-container { background: var(--bg-feuillet); padding: 20px; border-radius: 16px; height: 380px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--separator); box-shadow: 0 4px 6px rgba(0,0,0,0.01); transition: background-color 0.3s ease, border-color 0.3s ease;}
        .chart-container canvas { max-width: 100%; max-height: 100%; }

        .welcome-card { background: linear-gradient(135deg, rgba(0, 122, 255, 0.06), rgba(175, 82, 222, 0.06)); border: 1px solid var(--separator); padding: 24px; border-radius: 16px;}
        .welcome-card h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
        .welcome-card p { font-size: 14px; color: var(--txt-secondaire); }

        .list-container { display: flex; flex-direction: column; gap: 20px; }
        .list-card { background: var(--bg-feuillet); border-radius: 16px; overflow: hidden; border: 1px solid var(--separator); position: relative; padding-left: 20px;}
        .list-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 20px; height: 100%; background-color: var(--bg-reliure-strip); border-right: 1px solid var(--border-reliure);
            background-image: repeating-linear-gradient(0deg, var(--color-reliure-line) 0px, var(--color-reliure-line) 1px, transparent 1px, transparent 15px);
        }
        
        .list-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .list-header:hover { background-color: var(--bg-card-hover); }
        .subject-title-area { display: flex; align-items: center; gap: 10px; }
        .list-header h3 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.3px; color: var(--txt-primaire);}
        .list-header small { color: var(--txt-secondaire); font-size: 14px;}
        .list-body { display: none; }
        .list-body.active { display: block; }
        
        .appreciation-box { padding: 12px 20px; font-style: italic; color: var(--txt-secondaire); font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--separator); border-bottom: 1px solid var(--separator);}
        .appreciation-box strong { color: var(--txt-primaire); font-weight: 600; font-style: normal; margin-right: 5px;}

        .sub-subject { border-top: 1px solid var(--separator); }
        .sub-subject-header { padding: 12px 20px; font-weight: 600; font-size: 15px; color: var(--txt-primaire); display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-sub-subject);}

        .notes-area { background: var(--bg-feuillet); }
        .note-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin: 0 20px; border-bottom: 1px solid rgba(0,0,0,0.03); opacity: 1; }
        .note-item:last-child { border-bottom: none; }
        .note-value { font-weight: 700; font-size: 17px; }
        
        .sim-badge { font-size: 10px; padding: 4px 10px; border-radius: 50px; margin-left: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; vertical-align: middle;}
        .sim-badge.active { background-color: rgba(175, 82, 222, 0.15); color: var(--system-purple); border: 1px solid rgba(175, 82, 222, 0.2); }
        body.is-editing .sim-badge { cursor: pointer; }
        body.is-editing .sim-badge.sim-off { background-color: transparent; border: 1px solid var(--border-reliure); color: var(--txt-secondaire); }

        .add-note-form { padding: 12px 20px; background-color: var(--bg-sub-subject); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-top: 1px solid var(--separator);}
        
        .apple-input { padding: 8px 12px; border: 1px solid var(--separator); border-radius: 8px; font-size: 14px; background: var(--bg-input); color: var(--txt-primaire); transition: border-color 0.2s;}
        .apple-input:focus { outline: none; border-color: var(--system-blue); }
        .add-note-form input[type="number"] { width: 80px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--txt-secondaire); cursor: pointer; }
        
        .btn-action { background-color: var(--bg-input); color: var(--system-blue); border: 1px solid var(--separator); border-radius: 50px; padding: 6px 14px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .btn-action:hover { background-color: var(--bg-hover); }

        .main-form-box { background: var(--bg-feuillet); padding: 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; border: 1px solid var(--separator);}
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }

        .bilan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-feuillet); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid var(--separator);}
        .stat-card.featured { background: var(--system-blue); color: white; border: none;}
        .stat-card.featured h4 { color: rgba(255,255,255,0.8); }
        .stat-card h4 { color: var(--txt-secondaire); font-size: 13px; margin-bottom: 6px; text-transform: uppercase; font-weight: 600;}
        .stat-card p { font-size: 32px; font-weight: 700; letter-spacing: -1px; }

        .badge { font-weight: 700; padding: 4px 10px; border-radius: 12px; min-width: 55px; text-align: center; font-size: 14px; white-space: nowrap; flex-shrink: 0; }
        .badge-large { font-size: 16px; padding: 6px 14px; }
        
        .bg-good { background-color: rgba(52, 199, 89, 0.08); color: #2e7d32; } 
        body.dark-theme .bg-good { color: #30D158; background-color: rgba(48, 209, 88, 0.15); }
        .bg-medium { background-color: rgba(255, 149, 0, 0.08); color: #c67100; } 
        body.dark-theme .bg-medium { color: #FF9F0A; background-color: rgba(255, 159, 10, 0.15); }
        .bg-bad { background-color: rgba(255, 59, 48, 0.08); color: #c62828; }
        body.dark-theme .bg-bad { color: #FF453A; background-color: rgba(255, 69, 58, 0.15); }
        
        @media (prefers-color-scheme: dark) {
            body.system-theme .bg-good { color: #30D158; background-color: rgba(48, 209, 88, 0.15); }
            body.system-theme .bg-medium { color: #FF9F0A; background-color: rgba(255, 159, 10, 0.15); }
            body.system-theme .bg-bad { color: #FF453A; background-color: rgba(255, 69, 58, 0.15); }
        }
        
        .text-good { color: var(--system-green); } 
        .text-medium { color: var(--system-orange); } 
        .text-bad { color: var(--system-red); }

        .edit-only, .edit-only-flex, .edit-only-block { display: none !important; }
        body.is-editing .edit-only { display: inline-block !important; }
        body.is-editing .edit-only-flex { display: flex !important; }
        body.is-editing .edit-only-block { display: block !important; }

        .modal-backdrop {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.3);
            display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.25s ease-out;
        }
        .modal-backdrop.show { opacity: 1; pointer-events: auto; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .modal-card {
            background: var(--bg-modal); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); width: 275px; padding: 20px 16px 0 16px; border-radius: 14px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.15); transform: scale(1.15); transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.25, 1);
        }
        .modal-backdrop.show .modal-card { transform: scale(1); }
        .modal-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 5px; color: var(--txt-primaire); }
        .modal-card p { font-size: 13px; color: var(--txt-primaire); margin-bottom: 16px; line-height: 1.35; padding: 0 4px; }
        .modal-actions { display: flex; border-top: 1px solid var(--separator); margin: 0 -16px 0 -16px; }
        .modal-btn {
            flex: 1; padding: 11px; background: none; border: none; font-size: 16px; cursor: pointer; color: var(--system-blue); transition: background 0.15s; outline: none;
        }
        .modal-btn:first-child { border-right: 1px solid var(--separator); border-bottom-left-radius: 14px; }
        .modal-btn:last-child { border-bottom-right-radius: 14px; }
        .modal-btn.destructive { color: var(--system-red); font-weight: 600; }
        .modal-btn.bold { font-weight: 600; }

        /* --- RESPONSIVE MOBILE / IPHONE --- */
        @media (max-width: 1024px) {
            .topbar { padding: calc(12px + env(safe-area-inset-top)) 20px 12px; min-height: 60px; }
            .topbar h1 { font-size: 24px; }
            .badge-large { font-size: 14px; padding: 4px 10px; }
            
            .sidebar { 
                position: fixed; top: 0; left: 0; height: 100vh; max-height: 100vh;
                z-index: 100; box-shadow: 4px 0 15px rgba(0,0,0,0.1);
                transform: translateX(0); width: 280px !important; opacity: 1 !important;
            }
            body.sidebar-hidden .sidebar { 
                transform: translateX(-100%); pointer-events: none;
            }
            body:not(.sidebar-hidden) .sidebar-overlay {
                display: block; opacity: 1;
            }

            .main-content { width: 100vw; }
            .dashboard-container { padding: 15px; gap: 20px; }
            .chart-container { height: 280px !important; }
            .subject-title-area { flex-wrap: wrap; }
            .apple-input { font-size: 16px; }
        }

        /* --- VRAIE CORRECTION POUR MOBILE --- */
        @media (max-width: 500px) {
            .topbar { padding: 10px 12px; gap: 8px; }
            .topbar-left { gap: 6px; } 
            .topbar h1 { font-size: 18px; }
            .topbar-actions { gap: 6px; }
            
            /* Pastilles circulaires parfaites avec centrage flex */
            .ios-pill-btn { 
                padding: 0; 
                width: 36px; 
                height: 36px; 
                border-radius: 50%; 
                display: flex;
                justify-content: center; 
                align-items: center; 
            }
            
            /* Cacher TOUS les textes dans les pastilles, afficher uniquement les SVG au centre */
            .ios-pill-btn span.btn-text { display: none; }
            .ios-pill-btn svg { margin: 0; display: block; }

            .form-row { flex-direction: column; align-items: stretch; }
            .add-note-form { flex-direction: column; align-items: flex-start; }

        let db = {}; let historyQueue = []; let historyIndex = -1;
        let activeView = 'accueil'; let currentYear = 'Année 1'; let currentPage = 'Semestre 1';
        let includeSimulations = false; let isEditMode = false; let globalChart = null;
        let openYears = { "Année 1": true }; let openSubjects = new Set(); 
        
        let currentThemeState = localStorage.getItem('apple_notes_theme_v5') || 'system';

        function checkDataConsistency() {
            if (!db || !db.years) { db = JSON.parse(JSON.stringify(defaultData)); }
            const yearKeys = Object.keys(db.years);
            if (yearKeys.length === 0) { activeView = 'accueil'; currentYear = null; currentPage = null; return; }
            if (!currentYear || !db.years[currentYear]) { currentYear = yearKeys[0]; }
            
            const pageKeys = Object.keys(db.years[currentYear]);
            if (pageKeys.length > 0) {
                if (!currentPage || !db.years[currentYear][currentPage]) { currentPage = pageKeys[0]; }
            } else {
                currentPage = null;
                if (activeView === 'page') activeView = 'bilan_annuel';
            }
        }

        function checkEditGuard() {
            if (!isEditMode) {
                showCustomAlert("Modification refusée", "Vous devez impérativement passer en mode 'Modifier' pour effectuer cette action.");
                return false;
            }
            return true;
        }

       function save(skipHistory = false) { 
            localStorage.setItem('apple_notes_db_v6', JSON.stringify(db)); 
            if(!skipHistory) pushHistory(); 
            
            userDocRef.set(db).catch(error => {
                console.error("Erreur de synchronisation:", error);
            });
        }

        function pushHistory() {
            historyQueue = historyQueue.slice(0, historyIndex + 1); historyQueue.push(JSON.stringify(db));
            if(historyQueue.length > 50) historyQueue.shift(); else historyIndex++;
            updateHistoryButtons();
        }

        function undo() { if(historyIndex > 0) { historyIndex--; db = JSON.parse(historyQueue[historyIndex]); save(true); updateHistoryButtons(); checkDataConsistency(); renderSidebar(); renderMainContent(); } }
        function redo() { if(historyIndex < historyQueue.length - 1) { historyIndex++; db = JSON.parse(historyQueue[historyIndex]); save(true); updateHistoryButtons(); checkDataConsistency(); renderSidebar(); renderMainContent(); } }
        function updateHistoryButtons() { document.getElementById('btn-undo').disabled = (historyIndex <= 0); document.getElementById('btn-redo').disabled = (historyIndex >= historyQueue.length - 1); }

        function toggleSidebar() { document.body.classList.toggle('sidebar-hidden'); }
        
        function closeSidebarOnMobile() {
            if (window.innerWidth <= 1024) { document.body.classList.add('sidebar-hidden'); }

        function applyTheme() {
            document.body.classList.remove('light-theme', 'dark-theme', 'system-theme');
            document.body.classList.add(currentThemeState + '-theme');
            if (globalChart) renderMainContent();
        }

        function cycleTheme() {
            const states = ['system', 'light', 'dark'];
            const idx = states.indexOf(currentThemeState);
            currentThemeState = states[(idx + 1) % 3];
            localStorage.setItem('apple_notes_theme_v5', currentThemeState);
            applyTheme();
        }

        function isEffectivelyDark() {
            if (currentThemeState === 'dark') return true;
            if (currentThemeState === 'light') return false;
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (currentThemeState === 'system') applyTheme();
        });
        
        function toggleEditMode() {
            isEditMode = !isEditMode; document.body.classList.toggle('is-editing', isEditMode);
            const btnText = document.querySelector('#btn-edit-mode .btn-text');
            const btn = document.getElementById('btn-edit-mode');
            if (isEditMode) { 
                if(btnText) btnText.innerHTML = 'Terminé'; 
                btn.classList.add('active'); 
            } else { 
                if(btnText) btnText.innerHTML = 'Modifier'; 
                btn.classList.remove('active');

            renderSidebar(); renderMainContent();
        }
        
        function toggleGlobalSimulationBtn() {
            includeSimulations = !includeSimulations;
            const btn = document.getElementById('sim-toggle-btn');

            renderMainContent();

        function showCustomConfirm(title, message, onConfirm, isDestructive = false) {
            const modal = document.getElementById('custom-modal');

            document.getElementById('modal-message').innerText = message;
            const actions = document.getElementById('modal-actions-container');

                <button class="modal-btn" onclick="closeCustomModal()">Annuler</button>
                <button class="modal-btn ${isDestructive ? 'destructive' : 'bold'}" id="modal-confirm-btn">Confirmer</button>
            `;
            document.getElementById('modal-confirm-btn').onclick = () => { closeCustomModal(); onConfirm(); };
            modal.classList.add('show');
        }
        
        function showCustomAlert(title, message) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            const actions = document.getElementById('modal-actions-container');
            actions.innerHTML = `<button class="modal-btn bold" onclick="closeCustomModal()" style="width:100%;">OK</button>`;
            modal.classList.add('show');

        function closeCustomModal() { document.getElementById('custom-modal').classList.remove('show'); }

        document.addEventListener('keydown', (e) => {
            const activeElem = document.activeElement;

            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                if (isTyping) return;
                e.preventDefault();
                if (e.shiftKey) redo(); else undo();

            setViewBilanAnnuel("Nouvelle Année");

        function addNewPage(yName) {

            save();
            setViewPage(yName, "Nouveau Semestre");

        function deleteYear(yName) { 
            if(!checkEditGuard()) return;

                delete db.years[yName]; delete openYears[yName]; checkDataConsistency(); save(); renderSidebar(); renderMainContent(); 
            }, true);

        function deletePage() { 
            if(!checkEditGuard()) return;
            showCustomConfirm("Supprimer la page", `Supprimer définitivement la page "${currentPage}" ?`, () => {

            }, true);
        }

        function updateYearName(oldName, el) {
            if(!checkEditGuard()) { el.innerText = oldName; return; }
            let newName = el.innerText.trim();
            if(!newName || newName === oldName) { el.innerText = oldName; return; }
            if(db.years[newName]) { el.innerText = oldName; showCustomAlert("Nom existant", "Cette année existe déjà."); return; }
            let newYears = {}; for(let y in db.years) { if(y === oldName) newYears[newName] = db.years[y]; else newYears[y] = db.years[y]; }
            db.years = newYears; if(currentYear === oldName) currentYear = newName;
            if(openYears[oldName]) { openYears[newName] = true; delete openYears[oldName]; }
            save(); renderSidebar(); renderMainContent();
        }

        function updatePageName(oldName, el) {
            if(!checkEditGuard()) { el.innerText = oldName; return; }
            let newName = el.innerText.trim();
            if(!newName || newName === oldName) { el.innerText = oldName; return; }
            if(db.years[currentYear][newName]) { el.innerText = oldName; showCustomAlert("Nom existant", "Ce semestre existe déjà."); return; }
            let newPages = {}; for(let p in db.years[currentYear]) { if(p === oldName) newPages[newName] = db.years[currentYear][p]; else newPages[p] = db.years[currentYear][p]; }
            db.years[currentYear] = newPages; currentPage = newName; save(); renderSidebar(); renderMainContent();
        }

        function updateSubjectField(field, sIdx, el) {
            if(!checkEditGuard()) return;
            let sub = db.years[currentYear][currentPage][sIdx]; let val = el.innerText.trim();
            if (field === 'coef') { let num = parseFloat(val.replace(',','.')); if(isNaN(num) || num <= 0) { el.innerText = sub.coef; return; } if(sub.coef !== num) { sub.coef = num; save(); renderMainContent(); } } 
            else { if(!val && field==='name') { el.innerText = sub.name; return; } if(sub[field] !== val) { sub[field] = val; save(); renderMainContent(); } }
        }

        function updateSubSubjectField(field, sIdx, subIdx, el) {
            if(!checkEditGuard()) return;
            let sub = db.years[currentYear][currentPage][sIdx].subSubjects[subIdx]; let val = el.innerText.trim();
            if (field === 'coef') { let num = parseFloat(val.replace(',','.')); if(isNaN(num) || num <= 0) { el.innerText = sub.coef; return; } if(sub.coef !== num) { sub.coef = num; save(); renderMainContent(); } } 
            else { if(!val) { el.innerText = sub.name; return; } if(sub.name !== val) { sub.name = val; save(); renderMainContent(); } }
        }

        function handleEditableKeydown(e, el) { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } }
        function preventAccordion(e) { if(isEditMode) e.stopPropagation(); }

        function updateNoteField(field, sIdx, subIdx, nIdx, el) {
            if(!checkEditGuard()) return;
            let target = db.years[currentYear][currentPage][sIdx];
            let note = (subIdx !== null) ? target.subSubjects[subIdx].notes[nIdx] : target.notes[nIdx];
            let val = parseFloat(el.innerText.trim().replace(',','.'));
            if(isNaN(val) || (field === 'val' && (val < 0 || val > 20)) || (field === 'coef' && val <= 0)) { el.innerText = note[field]; return; }
            if(note[field] !== val) { note[field] = val; openSubjects.add(sIdx.toString()); save(); renderMainContent(); }
        }

        function toggleInlineSim(sIdx, subIdx, nIdx) {
            if(!checkEditGuard()) return;
            let target = db.years[currentYear][currentPage][sIdx];
            let note = (subIdx !== null) ? target.subSubjects[subIdx].notes[nIdx] : target.notes[nIdx];
            note.sim = !note.sim; openSubjects.add(sIdx.toString()); save(); renderMainContent();
        }

        function calcNotesAvg(notes) {
            if (!notes || notes.length === 0) return null;
            let sum = 0, coefSum = 0; notes.forEach(n => { if (n.sim && !includeSimulations) return; sum += n.val * n.coef; coefSum += n.coef; });
            return coefSum === 0 ? null : sum / coefSum;
        }
        function calcSubjectAvg(subject) {
            if (subject.subSubjects) { let sum = 0, coefSum = 0; subject.subSubjects.forEach(sub => { const avg = calcNotesAvg(sub.notes); if (avg !== null) { sum += avg * sub.coef; coefSum += sub.coef; } }); return coefSum === 0 ? null : sum / coefSum; }
            return calcNotesAvg(subject.notes);
        }
        function calcPageAvg(subjectsList) {
            if(!subjectsList || subjectsList.length === 0) return null; let sum = 0, coefSum = 0;
            subjectsList.forEach(sub => { const avg = calcSubjectAvg(sub); if (avg !== null) { sum += avg * sub.coef; coefSum += sub.coef; } }); return coefSum === 0 ? null : sum / coefSum;
        }
        function calcYearAvg(yearName) {
            const pages = db.years[yearName]; let sum = 0, count = 0;
            for (let pName in pages) { const avg = calcPageAvg(pages[pName]); if (avg !== null) { sum += avg; count++; } } return count === 0 ? null : sum / count;
        }
        function formatVal(v) { return v !== null && !isNaN(v) ? v.toFixed(2) : '--'; }
        function getBadgeClass(v) { return v >= 14 ? 'bg-good' : (v >= 10 ? 'bg-medium' : 'bg-bad'); }

            if (isNaN(v) || v < 0 || v > 20 || isNaN(c) || c <= 0) { showCustomAlert("Saisie invalide", "Veuillez entrer des valeurs valides."); return; }
            let arr = (subIdx !== null) ? db.years[currentYear][currentPage][sIdx].subSubjects[subIdx].notes : db.years[currentYear][currentPage][sIdx].notes;
            arr.push({ val: v, coef: c, sim: document.getElementById(`s-${id}`).checked }); 
            vInput.value = ''; cInput.value = ''; document.getElementById(`s-${id}`).checked = false;
            openSubjects.add(sIdx.toString()); save(); renderMainContent();
        }
        function submitSubject() {
            if(!checkEditGuard()) return;
            const nameInput = document.getElementById('add-sub-name'); const coefInput = document.getElementById('add-sub-coef');

            let newSub = { name, coef, appreciation: "" };
            if(document.getElementById('add-sub-isnest').checked) newSub.subSubjects = []; else newSub.notes = [];

            nameInput.value = ''; coefInput.value = ''; document.getElementById('add-sub-isnest').checked = false;

        }
        function addSubSubject(sIdx) { if(!checkEditGuard()) return; db.years[currentYear][currentPage][sIdx].subSubjects.push({ name: "Matière", coef: 1, notes: [] }); openSubjects.add(sIdx.toString()); save(); renderMainContent(); }
        function deleteSubSubject(sIdx, subIdx) { 
            if(!checkEditGuard()) return;
            showCustomConfirm("Supprimer la sous-matière", "Voulez-vous supprimer cette sous-matière ?", () => {
                db.years[currentYear][currentPage][sIdx].subSubjects.splice(subIdx, 1); openSubjects.add(sIdx.toString()); save(); renderMainContent(); 
            }, true);
        }

        function toggleYearSection(yName) { openYears[yName] = !openYears[yName]; renderSidebar(); }

        function renderSidebar() {
            const container = document.getElementById('sidebar-navigation');
            let html = `<div class="global-item ${activeView === 'accueil' ? 'active' : ''}" onclick="setViewGlobal()">Accueil</div>`;
            for (let yName in db.years) {
                const isYearActive = (activeView !== 'accueil' && currentYear === yName);
                const isSectionOpen = openYears[yName];
                html += `
                    <div class="year-section">
                        <div class="year-header ${isYearActive ? 'active' : ''}">
                            <div style="flex:1;" onclick="toggleYearSection('${yName}')">
                                <span class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onclick="preventAccordion(event)" onblur="updateYearName('${yName}', this)" onkeydown="handleEditableKeydown(event, this)">${yName}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <button class="icon-btn danger-zone edit-only" onclick="deleteYear('${yName}'); event.stopPropagation();">${svgTrash}</button>
                                <span class="icon-arrow" onclick="toggleYearSection('${yName}')">${isSectionOpen ? '▼' : '►'}</span>
                            </div>
                        </div>
                        <ul class="pages-list ${isSectionOpen ? 'open' : ''}">`;
                for (let pName in db.years[yName]) {
                    const isPageActive = (activeView === 'page' && currentYear === yName && currentPage === pName);
                    html += `<li class="page-item ${isPageActive ? 'active' : ''}" onclick="setViewPage('${yName}', '${pName}')">${pName}</li>`;
                }
                const isBilanActive = (activeView === 'bilan_annuel' && currentYear === yName);
                html += `<li class="page-item ${isBilanActive ? 'active' : ''}" onclick="setViewBilanAnnuel('${yName}')">Bilan Annuel</li>`;
                html += `<button class="sidebar-btn edit-only-block" onclick="addNewPage('${yName}')">+ Nouvelle Page</button></ul></div>`;
            }
            container.innerHTML = html;
        }

        function renderMainContent() {
            checkDataConsistency();
            const content = document.getElementById('content-area'); const title = document.getElementById('page-title');
            const simToggle = document.getElementById('sim-toggle-btn');
            
            simToggle.style.display = activeView === 'accueil' ? 'none' : 'inline-flex';

            if (activeView === 'page') {
                const pageAvg = calcPageAvg(db.years[currentYear][currentPage]);
                
                title.innerHTML = `
                    <span class="${isEditMode ? 'editable-text' : ''} title-text-ellipsis" contenteditable="${isEditMode}" onblur="updatePageName('${currentPage}', this)" onkeydown="handleEditableKeydown(event, this)">${currentPage}</span>
                    <button class="icon-btn danger-zone edit-only" style="flex-shrink: 0;" onclick="deletePage()">${svgTrash}</button>
                    <div class="badge badge-large ${getBadgeClass(pageAvg)} title-badge" style="margin-left: auto;"><span class="moy-text">Moyenne : </span>${formatVal(pageAvg)}</div>
                `;
                
                const pageData = db.years[currentYear][currentPage] || [];
                let labels = [], dataVals = [];
                
                let viewHtml = `<div class="chart-container" style="margin-bottom: 30px;"><canvas id="mainChart"></canvas></div>`;
                viewHtml += `<div class="list-container">`;

                pageData.forEach((subject, sIdx) => {
                    const subAvg = calcSubjectAvg(subject); 
                    labels.push(subject.name); 
                    dataVals.push(subAvg !== null ? parseFloat(subAvg.toFixed(2)) : 0);
                    const isSubjectOpen = openSubjects.has(sIdx.toString());

                    viewHtml += `
                        <div class="list-card">
                            <div class="list-header" onclick="toggleSubject('${sIdx}')">
                                <div class="subject-title-area">
                                    <h3 class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onclick="preventAccordion(event)" onblur="updateSubjectField('name', '${sIdx}', this)" onkeydown="handleEditableKeydown(event, this)">${subject.name}</h3>
                                    <small>Coef: <span class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onclick="preventAccordion(event)" onblur="updateSubjectField('coef', '${sIdx}', this)" onkeydown="handleEditableKeydown(event, this)">${subject.coef}</span></small>
                                    <button class="icon-btn danger-zone edit-only" onclick="deleteSubject('${sIdx}'); event.stopPropagation();">${svgTrash}</button>
                                </div>
                                <div class="badge ${getBadgeClass(subAvg)}">${formatVal(subAvg)}</div>
                            </div>
                            <div id="body-${sIdx}" class="list-body ${isSubjectOpen ? 'active' : ''}">
                                <div class="appreciation-box">
                                    <div style="flex:1"><strong>Appréciation :</strong><span class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onblur="updateSubjectField('appreciation', '${sIdx}', this)" onkeydown="handleEditableKeydown(event, this)">${subject.appreciation || (isEditMode ? 'Ajouter un commentaire...' : '-')}</span></div>
                                </div>`;

                    if (subject.subSubjects) {
                        subject.subSubjects.forEach((sub, subIdx) => {
                            const subAvgVal = calcNotesAvg(sub.notes);
                            viewHtml += `
                                <div class="sub-subject">
                                    <div class="sub-subject-header">
                                        <div>↳ <span class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onblur="updateSubSubjectField('name', '${sIdx}', '${subIdx}', this)" onkeydown="handleEditableKeydown(event, this)">${sub.name}</span> <span style="font-size:13px; font-weight:normal; color:var(--txt-secondaire)">(Coef: <span class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onblur="updateSubSubjectField('coef', '${sIdx}', '${subIdx}', this)" onkeydown="handleEditableKeydown(event, this)">${sub.coef}</span>)</span></div>
                                        <div style="display:flex; gap:10px; align-items:center;"><span class="${getTextClass(subAvgVal)} font-weight-bold">${formatVal(subAvgVal)}</span><button class="icon-btn danger-zone edit-only" onclick="deleteSubSubject('${sIdx}', '${subIdx}')">${svgTrash}</button></div>
                                    </div>
                                    <div class="notes-area">${buildNotesRows(sub.notes, sIdx, subIdx)}</div>${buildAddNoteRow(sIdx, subIdx)}
                                </div>`;
                        });
                        viewHtml += `<div class="edit-only-block" style="padding: 10px 20px;"><button class="btn-action" onclick="addSubSubject('${sIdx}')">+ Sous-matière</button></div>`;
                    } else { 
                        viewHtml += `<div class="notes-area">${buildNotesRows(subject.notes, sIdx, null)}</div>${buildAddNoteRow(sIdx, null)}`; 
                    }
                    viewHtml += `</div></div>`;
                });

                viewHtml += `</div><div class="edit-only-block">${buildAddSubjectForm()}</div>`;
                content.innerHTML = viewHtml;
                renderRadar(labels, [{ label: currentPage, data: dataVals, borderColor: '#007AFF', backgroundColor: 'rgba(0, 122, 255, 0.05)' }]);

            } else if (activeView === 'bilan_annuel') {
                title.textContent = `Bilan Annuel ${currentYear}`;
                let labels = [], datasets = [];
                let viewHtml = `<div class="bilan-grid">`;
                const yAvg = calcYearAvg(currentYear);
                viewHtml += `<div class="stat-card featured" style="grid-column: 1 / -1;"><h4>Moyenne de l'Année</h4><p>${formatVal(yAvg)}</p></div>`;

                if (db.years[currentYear]) {
                    for (let pName in db.years[currentYear]) {
                        const pAvg = calcPageAvg(db.years[currentYear][pName]);
                        viewHtml += `<div class="stat-card"><h4>${pName}</h4><p class="${getTextClass(pAvg)}">${formatVal(pAvg)}</p></div>`;
                        db.years[currentYear][pName].forEach(sub => { if (!labels.includes(sub.name)) labels.push(sub.name); });
                    }
                }
                viewHtml += `</div><div class="chart-container"><canvas id="mainChart"></canvas></div>`;
                content.innerHTML = viewHtml;

                const colors = ['#007AFF', '#34C759', '#FF9500', '#AF52DE']; let idx = 0;
                if (db.years[currentYear]) {
                    for (let pName in db.years[currentYear]) {
                        let d = []; 
                        labels.forEach(l => { 
                            const found = db.years[currentYear][pName].find(s => s.name === l); 
                            let parsedAvg = found ? calcSubjectAvg(found) : 0;
                            d.push(parsedAvg !== null ? parseFloat(parsedAvg.toFixed(2)) : 0); 
                        });
                        datasets.push({ label: pName, data: d, borderColor: colors[idx%colors.length], backgroundColor: 'transparent' }); 
                        idx++;
                    }
                }
                renderRadar(labels, datasets);

            } else if (activeView === 'accueil') {
                title.textContent = "Accueil";
                let labels = [], dataVals = [];
                
                let viewHtml = `
                    <div class="welcome-card" style="margin-bottom: 20px;">
                        <h2>Bonjour !</h2>
                        <p>Voici le récapitulatif global de vos performances scolaires sur l'ensemble de votre cursus.</p>
                    </div>
                `;
                
                let gridHtml = `<div class="bilan-grid">`;
                let cardsHtml = ''; let sumGlobal = 0, countGlobal = 0;
                
                for (let yName in db.years) {
                    const yAvg = calcYearAvg(yName);
                    cardsHtml += `<div class="stat-card"><h4>${yName}</h4><p class="${getTextClass(yAvg)}">${formatVal(yAvg)}</p></div>`;
                    if (yAvg !== null) { 
                        sumGlobal += yAvg; countGlobal++; labels.push(yName); 
                        dataVals.push(parseFloat(yAvg.toFixed(2))); 
                    }
                }
                
                const cycleAvg = countGlobal > 0 ? sumGlobal / countGlobal : null;
                gridHtml += `<div class="stat-card featured" style="grid-column: 1 / -1;"><h4>Moyenne Générale du Cycle</h4><p>${formatVal(cycleAvg)} / 20</p></div>`;
                gridHtml += cardsHtml; gridHtml += `</div>`;
                
                viewHtml += gridHtml;
                viewHtml += `<div class="chart-container" style="height:340px;"><canvas id="mainChart"></canvas></div>`;
                
                content.innerHTML = viewHtml;
                renderBarChart(labels, dataVals);
            }
        }

        function toggleSubject(sIdx) { const body = document.getElementById(`body-${sIdx}`); if(body.classList.contains('active')) { body.classList.remove('active'); openSubjects.delete(sIdx.toString()); } else { body.classList.add('active'); openSubjects.add(sIdx.toString()); } }

        function buildNotesRows(notes, sIdx, subIdx) {
            if(!notes || notes.length === 0) return `<div class="note-item"><small style="color:var(--txt-secondaire)">Aucune note.</small></div>`;
            let html = '';
            notes.forEach((n, nIdx) => {
                if (n.sim && !includeSimulations) return;
                html += `
                    <div class="note-item">
                        <div>
                            <span class="${isEditMode ? 'editable-text' : ''} note-value ${getTextClass(n.val)}" contenteditable="${isEditMode}" onblur="updateNoteField('val', '${sIdx}', ${subIdx}, ${nIdx}, this)" onkeydown="handleEditableKeydown(event, this)">${n.val}</span>
                            <small style="color:var(--txt-secondaire); font-size:14px;">/20 (Coef: <span class="${isEditMode ? 'editable-text' : ''}" contenteditable="${isEditMode}" onblur="updateNoteField('coef', '${sIdx}', ${subIdx}, ${nIdx}, this)" onkeydown="handleEditableKeydown(event, this)">${n.coef}</span>)</small>
                            ${isEditMode ? 
                                `<span class="sim-badge ${n.sim ? 'active' : 'sim-off'}" onclick="toggleInlineSim('${sIdx}', ${subIdx}, ${nIdx})">${n.sim ? 'Simulée' : 'Réelle'}</span>` 
                                : (n.sim ? `<span class="sim-badge active">Simulation</span>` : '')
                            }
                        </div>
                        <div class="edit-only-flex"><button class="icon-btn danger-zone" onclick="deleteNote('${sIdx}', ${subIdx}, ${nIdx})">${svgTrash}</button></div>
                    </div>`;
            });
            return html;
        }

        function buildAddNoteRow(sIdx, subIdx) {
            const id = `f-${sIdx}-${subIdx}`;
            return `
                <div class="add-note-form edit-only-flex">
                    <input class="apple-input" type="number" id="v-${id}" placeholder="Note" step="0.01" min="0" max="20" onkeydown="if(event.key==='Enter') submitNote('${sIdx}', ${subIdx}, '${id}')">
                    <input class="apple-input" type="number" id="c-${id}" placeholder="Coef" step="0.01" min="0" onkeydown="if(event.key==='Enter') submitNote('${sIdx}', ${subIdx}, '${id}')">
                    <label class="checkbox-label"><input type="checkbox" id="s-${id}"> Simulation</label>
                    <button class="btn-action" onclick="submitNote('${sIdx}', ${subIdx}, '${id}')">Ajouter</button>
                </div>`;
        }

        function buildAddSubjectForm() {
            return `
                <div class="main-form-box edit-only-flex">
                    <h3 style="font-size:17px; margin:0; letter-spacing:-0.3px;">Nouvelle Matière</h3>
                    <div class="form-row">
                        <input class="apple-input" type="text" id="add-sub-name" placeholder="Nom de la matière" style="flex:1; min-width:150px;">
                        <input class="apple-input" type="number" id="add-sub-coef" placeholder="Coef" step="0.1" style="width:80px;">
                        <label class="checkbox-label"><input type="checkbox" id="add-sub-isnest"> Sous-matières</label>
                        <button class="btn-action" onclick="submitSubject()">Créer</button>
                    </div>
                </div>`;
        }

        function renderRadar(labels, datasets) { 
            const ctx = document.getElementById('mainChart').getContext('2d'); if (globalChart) globalChart.destroy(); 
            const isDark = isEffectivelyDark();
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.06)';
            const labelColor = isDark ? '#AEAEB2' : '#1C1C1E';
            globalChart = new Chart(ctx, { 
                type: 'radar', data: { labels, datasets }, 
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { 
                        r: { 
                            min: 0, max: 20, 
                            grid: { color: gridColor }, angleLines: { color: gridColor }, 
                            pointLabels: { color: labelColor, font: { size: 10, weight: '600' } }, 
                            ticks: { color: '#8E8E93', backdropColor: 'transparent', stepSize: 4 } 
                        } 
                    }, 
                    plugins: { legend: { labels: { color: labelColor, boxWidth: 12, font: { size: 12 } } } } 
                } 
            }); 
        }

        function renderBarChart(labels, data) { 
            const ctx = document.getElementById('mainChart').getContext('2d'); if (globalChart) globalChart.destroy(); 
            const isDark = isEffectivelyDark();
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.06)';
            const labelColor = isDark ? '#AEAEB2' : '#1C1C1E';
            globalChart = new Chart(ctx, { 
                type: 'bar', data: { labels, datasets: [{ label: 'Moyenne', data, backgroundColor: '#007AFF', borderRadius: 8 }] }, 
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { x: { ticks: { color: labelColor }, grid: { display: false } }, y: { min: 0, max: 20, ticks: { color: '#8E8E93', stepSize: 4 }, grid: { color: gridColor } } }, 
                    plugins: { legend: { display: false } } 
                } 
            }); 
        }

        function handleResize() {
            if (window.innerWidth <= 1024) {
                document.body.classList.add('sidebar-hidden');
            } else {
                document.body.classList.remove('sidebar-hidden');
            }
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(handleResize, 100);
        });

        function init() {
            try { 
                const saved = localStorage.getItem('apple_notes_db_v6'); 
                if (saved) db = JSON.parse(saved); 
                else db = JSON.parse(JSON.stringify(defaultData)); 
            } catch(e) { 
                db = JSON.parse(JSON.stringify(defaultData)); 
            }
            
            applyTheme();

            if (Object.keys(db.years).length > 0) {
                currentYear = Object.keys(db.years)[0];
                let pages = Object.keys(db.years[currentYear]);
                if (pages.length > 0) currentPage = pages[0];
            }

            pushHistory(); 
            checkDataConsistency(); 
            activeView = 'accueil'; 
            renderSidebar(); 
            renderMainContent();
            handleResize();

            // ÉCOUTE DU CLOUD EN TEMPS RÉEL
            userDocRef.on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const cloudData = snapshot.val();
                    const localDataStr = JSON.stringify(db);
                    const cloudDataStr = JSON.stringify(cloudData);
                    
                    if (localDataStr !== cloudDataStr) {
                        db = cloudData;
                        localStorage.setItem('apple_notes_db_v6', JSON.stringify(db));
                        checkDataConsistency();
                        renderSidebar();
                        renderMainContent();
                    }
                } else if (Object.keys(db.years).length > 0) {
                    save(true);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
